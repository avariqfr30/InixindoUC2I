<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Analisis Sentimen HR</title>
    <style>
        /* Base Styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f8fafc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #1e293b; 
        }
        
        /* Main Application Card */
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            width: 450px; 
            text-align: center; 
            border: 1px solid #e2e8f0; 
        }
        
        /* Typography */
        h2 { margin: 0 0 5px 0; color: #0f172a; font-size: 1.6rem; }
        p { color: #64748b; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.5; }
        
        /* Form Elements */
        select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            font-size: 1rem; 
            background-color: #f8fafc; 
            color: #334155; 
            font-weight: 500;
        }
        select:focus { 
            border-color: #3b82f6; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
        }
        button { 
            width: 100%; 
            background: #10b981; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: background 0.2s ease; 
        }
        button:hover { background: #059669; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        /* Loading Animation */
        .spinner { 
            width: 18px; 
            height: 18px; 
            border: 2px solid white; 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            display: inline-block; 
            vertical-align: middle; 
            margin-left: 8px; 
        }
        .hidden { display: none !important; }
        
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📊 AI Sentiment Analyzer</h2>
        <p>Ekstrak <i>insight</i> mendalam, temukan pola masalah, dan dapatkan tindakan preventif berdasarkan rentang waktu evaluasi.</p>
        
        <select id="duration-select" aria-label="Pilih Rentang Waktu" title="Pilih Rentang Waktu">
            <option disabled selected>Pilih Rentang Waktu Analisis...</option>
            <option value="1w">1 Minggu Terakhir</option>
            <option value="1m">1 Bulan Terakhir</option>
            <option value="3m">3 Bulan Terakhir</option>
            <option value="6m">6 Bulan Terakhir</option>
            <option value="1y">1 Tahun Terakhir</option>
        </select>
        
        <button id="btn-generate" disabled>Buat Laporan Insight <div id="spin" class="spinner hidden"></div></button>
    </div>

    <script>
        const durationMenu = document.getElementById('duration-select');
        const submitButton = document.getElementById('btn-generate');
        const loader = document.getElementById('spin');

        durationMenu.addEventListener('change', () => {
            submitButton.disabled = false;
        });

        submitButton.addEventListener('click', () => {
            const code = durationMenu.value;
            const label = durationMenu.options[durationMenu.selectedIndex].text;
            
            submitButton.disabled = true;
            loader.classList.remove('hidden');
            submitButton.childNodes[0].nodeValue = "Menganalisis Pola HR... ";
            
            fetch('/api/build-report', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ duration: code, duration_label: label })
            })
            .then(response => {
                if (!response.ok) throw new Error("Gagal menyusun dokumen.");
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Laporan_Pola_HR_${code}.docx`;
                a.click();
                
                resetUI();
            })
            .catch(err => {
                alert("Terjadi kesalahan. Pastikan backend Flask dan Ollama berjalan.");
                console.error(err);
                resetUI();
            });
        });

        function resetUI() {
            submitButton.disabled = false;
            loader.classList.add('hidden');
            submitButton.childNodes[0].nodeValue = "Buat Laporan Insight ";
        }
    </script>
</body>
</html>
